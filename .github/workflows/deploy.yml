name: Render CV and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '**.yaml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install RenderCV
        run: pip install "rendercv[full]"

      - name: Render CV
        run: rendercv render "Boonyakorn_Tanrattanakorn_CV.yaml"

      - name: List render output
        run: find rendercv_output -type f || echo "rendercv_output directory not found"

      - name: Prepare output directory
        run: |
          mkdir -p _site
          find rendercv_output -name "*.html" -exec cp {} _site/index.html \;
          find rendercv_output -name "*.pdf" -exec cp {} _site/Boonyakorn_Tanrattanakorn_CV.pdf \; || true
          find rendercv_output -name "*.png" -exec cp {} _site/ \; || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
