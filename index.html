<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boonyakorn Tanrattanakorn — CV</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        padding: 48px 56px;
        max-width: 480px;
        width: 90%;
        text-align: center;
      }

      .avatar {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: #1a1a1a;
        color: #fff;
        font-size: 28px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        letter-spacing: -1px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 32px;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 24px;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        transition: opacity 0.15s, transform 0.1s;
      }

      .btn:hover { opacity: 0.85; transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }

      .btn-primary {
        background: #1a1a1a;
        color: #fff;
      }

      .btn-secondary {
        background: #f0f0f0;
        color: #1a1a1a;
      }

      .icon { font-size: 1.1rem; flex-shrink: 0; }

      .divider {
        border: none;
        border-top: 1px solid #eee;
        margin: 28px 0;
      }

      .footer {
        font-size: 0.78rem;
        color: #aaa;
      }

      .footer a { color: #aaa; text-decoration: underline; }
      .footer a:hover { color: #666; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">BT</div>
      <h1>Boonyakorn Tanrattanakorn</h1>
      <p class="subtitle">Computer Engineering · Chulalongkorn University</p>

      <div class="links">
        <a class="btn btn-primary" href="cv.html">
          <span class="icon">📄</span>
          View CV (HTML)
        </a>
        <a class="btn btn-secondary" href="Boonyakorn_Tanrattanakorn_CV.pdf" download>
          <span class="icon">⬇️</span>
          Download CV (PDF)
        </a>
      </div>

      <hr class="divider" />

      <p class="footer">
        Generated with <a href="https://github.com/rendercv/rendercv" target="_blank" rel="noopener">RenderCV</a>
      </p>
    </div>
  </body>
</html>
